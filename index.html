<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Maker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎂Blissful Bakes🎂</h1>
<p>Select your favourite cake</p>

<div class="box">
    <button onclick="selectCake(
        'Chocolate Cake',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz5zAJODLrT-FoJ_rjvFl8wUu1zvu6Mz1osQ&s',
        'https://www.youtube.com/embed/EfJhprwv3Sw',
        [
            '6 Eggs',
            '1 cup (200g) Sugar',
            '1 teaspoon Vanilla extract',
            '1 cup + 1 tbsp (140g) Flour',
            '2 teaspoons Baking powder',
            '1/2 cup (50g) Cocoa powder',
            '1/4 cup (60g) Butter, melted',
            '1/2 teaspoon Salt',
            'For the syrup: 1/2 cup (120ml) Water, 1/2 cup (100g) Sugar, 1/4 cup (60ml) Kirsch or cherry liquor (optional)',
            'For the cherry filling: 1 Jar (680g) Cherries, Cherry juice from the jar/can, 40g Cornstarch, 1/4 cup (50g) Sugar, 1/4 cup (60g) Kirsch or cherry liquor (optional)',
            'For the cream filling: 2½ cups (600ml) Heavy cream, cold, 1/2 cup (65g) Powdered sugar, 3-4 tablespoons Instant pudding (optional)',
            'For decoration: 1/2 cup (120ml) Heavy cream, cold, 2-3 tablespoons Instant pudding (optional), 2 tablespoons Powdered sugar, Maraschino cherries/fresh cherries, Dark chocolate shavings'
        ]
    )">Chocolate Cake</button>

    <button onclick="selectCake(
        'Vanilla Cake',
        'https://thescranline.com/wp-content/uploads/2025/02/VANILLA-CAKE-25-S-01.jpg',
        'https://www.youtube.com/embed/EYXQmbZNhy8',
        [
    '4 Eggs',
    '1 1/4 cups (250g) Sugar',
    '1/2 cup (120ml) Milk',
    '2 cups (240g) Flour',
    '2 teaspoons Baking powder',
    '1/2 cup (115g) Butter, softened',
    '1/2 teaspoon Salt',
    '2 teaspoons Vanilla extract',
    'For decoration: 1 cup (240ml) Whipped cream or frosting, Sprinkles or fruit as desired'
]

    )">Vanilla Cake</button>

    <button onclick="selectCake(
        'Strawberry Cake',
        'https://www.mybakingaddiction.com/wp-content/uploads/2023/06/chocolate-strawberry-cake-on-stand-hero.jpg',
        'https://www.youtube.com/embed/7lX6nrSUASc',
        [
    '4 Eggs',
    '1 cup (200g) Sugar',
    '1/2 cup (120ml) Milk',
    '1 1/2 cups (180g) Flour',
    '1 1/2 teaspoons Baking powder',
    '1/4 cup (60g) Butter, melted',
    '1/2 teaspoon Salt',
    '1 teaspoon Vanilla extract',
    'For the strawberry filling: 1 cup fresh strawberries, 1/4 cup (50g) Sugar, 1 teaspoon Lemon juice',
    'For decoration: 1/2 cup (120ml) Whipped cream, Sliced strawberries, Optional sugar dusting'
]
    )">Strawberry Cake</button>

    <button onclick="selectCake(
        'Black Forest Cake',
        'https://www.punebakers.com/cdn/shop/products/black101.jpg?v=1617438460',
        'https://www.youtube.com/embed/4g0WUw_dCvQ',
      [
    '6 Eggs',
    '1 cup (200g) Sugar',
    '1 cup + 1 tbsp (140g) Flour',
    '2 teaspoons Baking powder',
    '1/2 cup (50g) Cocoa powder',
    '1/4 cup (60g) Butter, melted',
    '1/2 teaspoon Salt',
    'For the syrup: 1/2 cup (120ml) Water, 1/2 cup (100g) Sugar, 1/4 cup (60ml) Kirsch or cherry liquor',
    'For the cherry filling: 1 Jar (680g) Cherries, Cherry juice from the jar/can, 40g Cornstarch, 1/4 cup (50g) Sugar, 1/4 cup (60g) Kirsch',
    'For the cream: 2½ cups (600ml) Heavy cream, 1/2 cup (65g) Powdered sugar, 3-4 tbsp Instant pudding (optional)',
    'For decoration: Maraschino cherries, Dark chocolate shavings, Whipped cream'
]

    )">Black Forest Cake</button>

    <button onclick="selectCake(
        'Pineapple Cake',
        'https://gurgaonbakers.com/wp-content/uploads/2020/10/tangy-pineapple-cake.jpg',
        'https://www.youtube.com/embed/VgC2dj1F_zI',
        [
    '3 Eggs',
    '1 cup (200g) Sugar',
    '1/2 cup (120ml) Oil or Butter, melted',
    '1 1/2 cups (180g) Flour',
    '1 1/2 teaspoons Baking powder',
    '1/2 teaspoon Salt',
    '1 teaspoon Vanilla extract',
    '1 cup Pineapple puree or crushed pineapple',
    'For topping: Pineapple slices, Cherries, Optional glaze'
]

    )">Pineapple Cake</button>

    <button onclick="selectCake(
        'Red Velvet Cake',
        'https://bakewithzoha.com/wp-content/uploads/2024/09/red-velvet-cake-featured-1.jpg',
        'https://www.youtube.com/embed/cMPUB3DUssA',
        [
    '2 1/2 cups (300g) Flour',
    '1 1/2 cups (300g) Sugar',
    '1 teaspoon Baking soda',
    '1 teaspoon Cocoa powder',
    '1/2 teaspoon Salt',
    '1 1/2 cups (360ml) Buttermilk',
    '1/2 cup (120ml) Vegetable oil',
    '2 Eggs',
    '2 teaspoons Vanilla extract',
    '1 teaspoon White vinegar',
    'Red food coloring as needed',
    'For frosting: 1 cup (230g) Butter, softened, 4 cups (480g) Powdered sugar, 1 tsp Vanilla, 8 oz (225g) Cream cheese'
]

    )">Red Velvet Cake</button>

    <button onclick="selectCake(
        'Butterscotch Cake',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpVqPRJH0OVCod4h3mNOwp7Gblrnbf8_BH7A&s',
        'https://www.youtube.com/embed/EtQqmAsvHU0',
        [
    '4 Eggs',
    '1 1/4 cups (250g) Brown sugar',
    '1/2 cup (120ml) Milk',
    '1 1/2 cups (180g) Flour',
    '1 1/2 teaspoons Baking powder',
    '1/4 cup (60g) Butter, melted',
    '1/2 teaspoon Salt',
    '1 teaspoon Vanilla extract',
    'For butterscotch sauce: 1/2 cup (120g) Brown sugar, 1/4 cup (60g) Butter, 1/4 cup (60ml) Milk',
    'For decoration: Whipped cream, Nuts, Optional caramel drizzle'
]

    )">Butterscotch Cake</button>

    <button onclick="selectCake(
        'Coffee Cake',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhZDCIN00RwvMXSrPChKmcnvcSaaSpfeEjiw&s',
        'https://www.youtube.com/embed/hOhDXH1PXfc',
        [
    '3 Eggs',
    '1 cup (200g) Sugar',
    '1/2 cup (120ml) Oil or Butter',
    '1 1/2 cups (180g) Flour',
    '1 1/2 teaspoons Baking powder',
    '1/2 teaspoon Salt',
    '2 teaspoons Instant coffee dissolved in 2 tbsp hot water',
    '1 teaspoon Vanilla extract',
    'For topping: 1/4 cup (50g) Brown sugar, 1 teaspoon Cinnamon, 2 tbsp Butter, chopped nuts (optional)',
    'For glaze: 1/2 cup (120ml) Coffee, 1/2 cup (65g) Powdered sugar'
]

    )">Coffee Cake</button>
</div>

<div class="box" id="result" style="display:none;">
    <h2 id="cakeName"></h2>
    <img id="cakeImg" alt="Cake Image">
    <h3>Ingredients</h3>
    <ul id="cakeIngredients"></ul>
    <h3>Preparation Video</h3>
    <iframe id="cakeVideo" width="300" height="200" frameborder="0" allowfullscreen></iframe>
    <br><br>
    <button onclick="hideResult()">Back</button>
</div>

<script src="index.js"></script>
</body>
</html>
